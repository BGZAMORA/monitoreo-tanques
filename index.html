<!DOCTYPE html>
<html>
<head>
  <title>Panel de Control - Bryan</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; padding: 30px; text-align: center; }
    .container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin-top: 30px; }
    .tank-card { background: #1e293b; width: 260px; padding: 25px; border-radius: 15px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); border: 1px solid #334155; }
    .tank-name { font-size: 24px; font-weight: bold; color: #f8fafc; margin-bottom: 10px; }
    .temp-val { font-size: 32px; color: #10b981; font-weight: bold; margin: 15px 0; }
    .btn-medir { background: #10b981; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
    .btn-medir:hover { background: #059669; transform: translateY(-2px); }
    #chartBox { display: none; margin: 50px auto; background: #1e293b; padding: 20px; border-radius: 12px; max-width: 800px; }
  </style>
</head>
<body>

  <h1>Panel de Control de Tanques 🌡️</h1>
  <div class="container" id="tanks">Buscando datos en Supabase...</div>

  <div id="chartBox">
    <h2 id="chartTitle"></h2>
    <canvas id="tempChart"></canvas>
  </div>

  <script>
    // Configuración con tus datos reales
    const SUPABASE_URL = "https://cdkmxeuktheztkxkyimk.supabase.co";
    const SUPABASE_KEY = "sb_publishable_nRag0yBaTFVIxXoFKd-tXg_0xdA8rkY"; 
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function cargarDatos() {
      const { data, error } = await client.from("readings").select("*").order("created_at", { ascending: false });
      
      if (error) {
        document.getElementById("tanks").innerHTML = "Error al conectar con la base de datos.";
        return;
      }

      // Agrupar el último dato de cada tanque
      const tanques = {};
      data.forEach(r => { if (!tanques[r.device_id]) tanques[r.device_id] = r; });

      let html = "";
      Object.keys(tanques).forEach(id => {
        const d = tanques[id];
        const hora = new Date(d.created_at).toLocaleTimeString();
        
        html += `
          <div class="tank-card">
            <div class="tank-name">${id}</div>
            <div class="temp-val">${d.temperature} °C</div>
            <div style="font-size:12px; color:#94a3b8; margin-bottom:15px;">Última vez: ${hora}</div>
            <button class="btn-medir" onclick="solicitarLectura('${id}')">🔄 Medir ahora</button>
          </div>
        `;
      });
      document.getElementById("tanks").innerHTML = html;
    }

    async function solicitarLectura(tanque) {
      const { error } = await client
        .from('comandos')
        .insert([{ device_id: tanque, accion: 'medir_ahora', leido: false }]);

      if (error) {
        alert("Error al enviar orden");
      } else {
        alert("¡Orden enviada! Revisa tu ESP32.");
      }
    }

    cargarDatos();
    setInterval(cargarDatos, 10000); // Se actualiza cada 10 segundos
  </script>
</body>
</html>
